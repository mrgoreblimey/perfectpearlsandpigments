<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfect Pearls &amp; Pigments — Redesign V2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="ppp-data.js"></script>
<style>
:root {
  --acc: #F69311;
  --r: 12px;
  --ink: #17150F;
  --line: #ECEAE4;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Lexend', sans-serif;
  background: #FAF9F7;
  color: var(--ink);
  overflow-x: hidden;
}
h1, h2, h3 {
  font-family: 'Archivo', sans-serif;
  font-weight: 700;
}
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: #F0EEE9; }
::-webkit-scrollbar-thumb { background: #C9C6BE; border-radius: 3px; }

.v2-wrap { max-width: 1360px; margin: 0 auto; padding: 0 32px; }

/* ─── Keyframes ─── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes v2FadeDown {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.ppp-fade-1 { opacity: 0; animation: fadeUp 0.7s 0.1s ease forwards; }
.ppp-fade-2 { opacity: 0; animation: fadeUp 0.7s 0.22s ease forwards; }
.ppp-fade-3 { opacity: 0; animation: fadeUp 0.7s 0.34s ease forwards; }
.ppp-fade-4 { opacity: 0; animation: fadeUp 0.7s 0.46s ease forwards; }

/* ─── Buttons ─── */
.v2-btn-primary {
  display: inline-flex; align-items: center; gap: 9px;
  background: var(--acc); color: #17150F;
  border: none; cursor: pointer; border-radius: 10px;
  padding: 15px 30px;
  font-family: 'Lexend', sans-serif; font-size: 0.88rem; font-weight: 600;
  transition: filter 0.2s, transform 0.2s;
}
.v2-btn-primary:hover { filter: brightness(1.08); transform: translateY(-1px); }

.v2-btn-ghost {
  display: inline-flex; align-items: center; gap: 8px;
  background: transparent; color: #fff;
  border: 1px solid rgba(255,255,255,0.28); cursor: pointer; border-radius: 10px;
  padding: 14px 26px;
  font-family: 'Lexend', sans-serif; font-size: 0.88rem; font-weight: 500;
  transition: border-color 0.2s, background 0.2s;
}
.v2-btn-ghost:hover { border-color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.06); }

.v2-select-btn {
  display: flex; align-items: center; justify-content: center;
  width: 100%; background: #fff; color: var(--ink);
  border: 1px solid #DEDBD3; cursor: pointer; border-radius: 9px;
  padding: 11px; font-family: 'Lexend', sans-serif;
  font-size: 0.8rem; font-weight: 600;
  transition: background 0.18s, color 0.18s, border-color 0.18s;
}
.v2-select-btn:hover { background: var(--ink); color: #fff; border-color: var(--ink); }

.v2-link-btn {
  background: none; border: none; cursor: pointer;
  font-family: 'Lexend', sans-serif; font-size: 0.82rem; font-weight: 500;
  color: #6E6B64; transition: color 0.15s; padding: 6px 0;
}
.v2-link-btn:hover { color: var(--ink); }

.v2-arrow-btn {
  width: 34px; height: 34px; background: #fff;
  border: 1px solid #DEDBD3; cursor: pointer; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.82rem; color: #55534E;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.v2-arrow-btn:hover { border-color: var(--ink); color: var(--ink); }

/* ─── Header ─── */
.v2-nav-btn {
  background: none; border: none; cursor: pointer;
  font-family: 'Lexend', sans-serif; font-size: 0.85rem; font-weight: 500;
  padding: 8px 13px; border-radius: 8px;
  display: flex; align-items: center;
  transition: color 0.15s, background 0.15s;
}
.v2-icon-btn {
  background: none; border: none; cursor: pointer; color: #B5B2AB;
  width: 38px; height: 38px; border-radius: 50%; line-height: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s;
}
.v2-icon-btn:hover { background: rgba(255,255,255,0.09); color: #fff; }

.v2-mega-item {
  display: flex; align-items: flex-start; gap: 13px;
  padding: 11px 12px; border-radius: 10px; cursor: pointer;
  transition: background 0.14s;
}
.v2-mega-item:hover { background: rgba(255,255,255,0.05); }

/* ─── Cards ─── */
.v2-card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--r);
  overflow: hidden; cursor: pointer;
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
}
.v2-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 18px 44px rgba(30,24,8,0.09);
  border-color: #DEDBD3;
}

.v2-cat-track::-webkit-scrollbar { display: none; }
.v2-cat-card { transition: transform 0.25s, box-shadow 0.25s; }
.v2-cat-card:hover { transform: translateY(-4px); box-shadow: 0 18px 44px rgba(30,24,8,0.18); }
.v2-cat-arrow {
  width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
  background: rgba(255,255,255,0.2); backdrop-filter: blur(4px);
  color: #fff; font-size: 0.8rem;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.v2-cat-card:hover .v2-cat-arrow { background: rgba(255,255,255,0.35); }

/* ─── Footer ─── */
.v2-footer-link {
  color: #8D8A83; font-size: 0.83rem; text-decoration: none; font-weight: 300;
  transition: color 0.15s;
}
.v2-footer-link:hover { color: #fff; }
.v2-social-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid #2A2A2A;
  display: flex; align-items: center; justify-content: center;
  color: #77746D; font-size: 0.68rem; font-weight: 700; cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
.v2-social-btn:hover { border-color: var(--acc); color: var(--acc); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="ppp-components-v2.jsx"></script>
<script type="text/babel" src="ppp-sections-v2.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "heroLayout": "Inset panel",
  "accent": "#F69311",
  "heroHeadline": "Colour without limits",
  "radius": 12,
  "showUsp": true
}/*EDITMODE-END*/;

const App = () => {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);

  const addToCart = (product) => { setCart(prev => [...prev, product]); setCartOpen(true); };
  const removeFromCart = (idx) => setCart(prev => prev.filter((_, i) => i !== idx));

  useEffect(() => {
    document.documentElement.style.setProperty('--acc', t.accent);
    document.documentElement.style.setProperty('--r', t.radius + 'px');
  }, [t.accent, t.radius]);

  return (
    <div>
      <V2Header cart={cart} onCartOpen={() => setCartOpen(true)} accent={t.accent} />
      <V2Hero accent={t.accent} headline={t.heroHeadline} layout={t.heroLayout} />
      {t.showUsp && <V2UspRow accent={t.accent} />}
      <V2Categories accent={t.accent} />
      <V2BestSellers onAddToCart={addToCart} accent={t.accent} />
      <V2Showcase accent={t.accent} />
      <V2NewIn onAddToCart={addToCart} accent={t.accent} />
      <V2Stats accent={t.accent} />
      <V2Reviews accent={t.accent} />
      <V2Newsletter accent={t.accent} />
      <V2Footer accent={t.accent} />
      <V2CartDrawer cart={cart} open={cartOpen} onClose={() => setCartOpen(false)} onRemove={removeFromCart} accent={t.accent} />

      <TweaksPanel>
        <TweakSection label="Hero" />
        <TweakSelect label="Layout" value={t.heroLayout}
          options={["Inset panel", "Full-bleed", "Split"]}
          onChange={(v) => setTweak('heroLayout', v)} />
        <TweakText label="Headline" value={t.heroHeadline}
          onChange={(v) => setTweak('heroHeadline', v)} />
        <TweakSection label="Style" />
        <TweakColor label="Accent" value={t.accent}
          options={['#F69311', '#00C2E0', '#E8452C', '#8B5CF6']}
          onChange={(v) => setTweak('accent', v)} />
        <TweakSlider label="Corner radius" value={t.radius} min={6} max={20} unit="px"
          onChange={(v) => setTweak('radius', v)} />
        <TweakToggle label="USP row" value={t.showUsp}
          onChange={(v) => setTweak('showUsp', v)} />
      </TweaksPanel>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
